# ec.toml — operator configuration, safe to version control
# No secrets here. Ever.

relay_url  = "wss://relay.mostro.network"
grpc_bind  = "127.0.0.1:50051"
rules_dir  = "./rules"
log_level  = "info"
db_path    = "./ec.db"

# TLS for the gRPC admin API (PEM paths; set both or neither).
# Required before binding grpc_bind to anything beyond loopback — without it
# the admin token and generated registration tokens cross the wire in cleartext.
# tls_cert = "./ec-cert.pem"
# tls_key  = "./ec-key.pem"

